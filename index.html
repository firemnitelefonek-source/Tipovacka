<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tipovačka</title>
</head>
<body>

<h1>🏒 Tipovačka</h1>

<input id="name" placeholder="Tvoje jméno"><br><br>

<div>
  Česko vs Kanada:<br>
  <input id="tip1" placeholder="např. 3:2">
</div><br>

<button onclick="save()">Uložit</button>

<h2>Tipy všech</h2>
<div id="list"></div>

<script>
const SUPABASE_URL = "https://bcfohzblwjrjsjisbvgc.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJjZm9oemJsd2pyanNqaXNidmdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyODA2MzEsImV4cCI6MjA5NDg1NjYzMX0.nre93MtfapvEkOpZKREUCZQMcWgoSWbUpb3ZzclFlBE";

async function save() {
  const name = document.getElementById("name").value;
  const tip1 = document.getElementById("tip1").value;

  await fetch(`${SUPABASE_URL}/rest/v1/tips`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    },
    body: JSON.stringify({
      name: name,
      tips: { match1: tip1 }
    })
  });

  load();
}

async function load() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/tips?select=*`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  });

  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(t => {
    list.innerHTML += `<div><b>${t.name}</b>: ${t.tips.match1}</div>`;
  });
}

load();
</script>

</body>
</html>
