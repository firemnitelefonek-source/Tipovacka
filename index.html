<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tipovačka</title>
</head>
<body>

<h1>🏒 Tipovačka</h1>

<button onclick="toggleAdmin()">🔑 Admin</button>

<div id="admin" style="display:none; border:1px solid #ccc; padding:10px; margin:10px 0;">
  <h3>Admin panel</h3>
  <input id="matchName" placeholder="Název zápasu"><br><br>
  <input id="matchTime" type="datetime-local"><br><br>
  <button onclick="addMatch()">Přidat zápas</button>
</div>

<hr>

<input id="name" placeholder="Tvoje jméno"><br><br>

<div id="matches"></div>

<button onclick="save()">Uložit tip</button>

<h2>Tipy všech</h2>
<div id="list"></div>

<script>
const SUPABASE_URL = "https://bcfohzblwjrjsjisbvgc.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJjZm9oemJsd2pyanNqaXNidmdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyODA2MzEsImV4cCI6MjA5NDg1NjYzMX0.nre93MtfapvEkOpZKREUCZQMcWgoSWbUpb3ZzclFlBE";

// ✅ ADMIN toggle
function toggleAdmin() {
  const pass = prompt("Zadej heslo");
  if (pass === "1234") {
    document.getElementById("admin").style.display = "block";
  }
}

// ✅ přidání zápasu
async function addMatch() {
  const name = document.getElementById("matchName").value;
  const time = document.getElementById("matchTime").value;

  await fetch(`${SUPABASE_URL}/rest/v1/matches`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    },
    body: JSON.stringify({
      name: name,
      deadline: time
    })
  });

  loadMatches();
}

// ✅ načtení zápasů
async function loadMatches() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/matches?select=*`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  });

  const data = await res.json();

  const div = document.getElementById("matches");
  div.innerHTML = "";

  data.forEach(m => {
    const locked = new Date() > new Date(m.deadline);

    div.innerHTML += `
      <div style="border:1px solid #ccc; padding:8px; margin-bottom:8px;">
        <b>${m.name}</b><br>
        <small>${new Date(m.deadline).toLocaleString()}</small><br>

        <input id="tip_${m.id}" ${locked ? "disabled" : ""} placeholder="např. 3:2">
        ${locked ? "<span style='color:red'> Zamčeno</span>" : ""}

        <br><br>
        <button onclick="editMatch(${m.id}, '${m.name}', '${m.deadline}')">Upravit</button>
        <button onclick="deleteMatch(${m.id})" style="color:red;">Smazat</button>
      </div>
    `;
  });
}

// ✅ uložit tip
async function save() {
  const name = document.getElementById("name").value;

  const res = await fetch(`${SUPABASE_URL}/rest/v1/matches?select=*`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  });

  const matches = await res.json();
  const tips = {};

  matches.forEach(m => {
    const input = document.getElementById(`tip_${m.id}`);
    if (input && input.value) {
      tips[m.id] = input.value;
    }
  });

  await fetch(`${SUPABASE_URL}/rest/v1/tips`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    },
    body: JSON.stringify({
      name,
      tips
    })
  });

  loadTips();
}

// ✅ načtení tipů
async function loadTips() {
  // načti zápasy
  const matchesRes = await fetch(`${SUPABASE_URL}/rest/v1/matches?select=*`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  });

  const matches = await matchesRes.json();

  // načti tipy
  const tipsRes = await fetch(`${SUPABASE_URL}/rest/v1/tips?select=*`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  });

  const tips = await tipsRes.json();

  const div = document.getElementById("list");
  div.innerHTML = "";

  // 🔥 pro každý zápas zvlášť
  matches.forEach(match => {
    let html = `<h3>${match.name}</h3>`;

    tips.forEach(t => {
      if (t.tips && t.tips[match.id]) {
        html += `<div><b>${t.name}</b>: ${t.tips[match.id]}</div>`;
      }
    });

    div.innerHTML += html + "<br>";
  });
}
  
// ✅ úprava zápasu
function editMatch(id, oldName, oldDeadline) {
  const newName = prompt("Nový název:", oldName);
  const newDeadline = prompt("Nový čas (YYYY-MM-DD HH:MM)", oldDeadline);

  if (!newName || !newDeadline) return;

  fetch(`${SUPABASE_URL}/rest/v1/matches?id=eq.${id}`, {
    method: "PATCH",
    headers: {
      "Content-Type": "application/json",
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    },
    body: JSON.stringify({
      name: newName,
      deadline: newDeadline
    })
  }).then(loadMatches);
}

// ✅ smazání zápasu
function deleteMatch(id) {
  if (!confirm("Opravdu smazat zápas?")) return;

  fetch(`${SUPABASE_URL}/rest/v1/matches?id=eq.${id}`, {
    method: "DELETE",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  }).then(loadMatches);
}
  
loadMatches();
loadTips();
</script>

</body>
</html>
